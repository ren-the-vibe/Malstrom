<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; media-src *; connect-src *;">
  <title>Malstrom</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Transport Bar -->
  <header id="transport">
    <div class="transport-left">
      <span class="logo">MALSTROM</span>
      <button id="btn-save" class="transport-btn" title="Save Project">Save</button>
      <button id="btn-load" class="transport-btn" title="Load Project">Load</button>
    </div>
    <div class="transport-center">
      <button id="btn-play" class="transport-btn" title="Play">&#9654;</button>
      <button id="btn-stop" class="transport-btn" title="Stop">&#9632;</button>
      <div class="bpm-control">
        <label for="bpm">BPM</label>
        <input type="number" id="bpm" value="120" min="20" max="300" step="1">
      </div>
    </div>
    <div class="transport-right">
      <button id="btn-samples" class="transport-btn" title="Browse Samples">Samples</button>
      <button id="btn-init-audio" class="transport-btn accent" title="Initialize Audio">Start Audio</button>
      <span id="audio-status" class="status-dot off"></span>
    </div>
  </header>

  <!-- Main Layout -->
  <div id="main">
    <!-- Module Palette Sidebar -->
    <aside id="palette">
      <h2>Modules</h2>
      <div id="palette-list"></div>
    </aside>

    <!-- Rack Area -->
    <div id="rack-container">
      <div id="rack"></div>
      <!-- SVG Cable Overlay -->
      <svg id="cables" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!-- Debug / Compiled Code Viewer -->
  <footer id="code-viewer">
    <span class="code-label">Strudel:</span>
    <code id="compiled-code"></code>
  </footer>

  <!-- Sample Browser Modal -->
  <div id="sample-browser-modal" class="sb-overlay">
    <div class="sb-modal">
      <div class="sb-header">
        <h3>Sample Browser</h3>
        <input type="text" class="sb-search" placeholder="Search packs...">
        <button class="sb-close">&times;</button>
      </div>
      <div class="sb-body">
        <div class="sb-packs">
          <div class="sb-section-title">Packs</div>
          <div class="sb-pack-list"></div>
        </div>
        <div class="sb-samples">
          <div class="sb-section-title sb-pack-title">Select a pack</div>
          <div class="sb-sample-list"></div>
          <button class="sb-load-btn transport-btn accent">Load Pack</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
